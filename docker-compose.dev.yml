services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm dev:mock
    init: true
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3030
    ports:
      - "3030:3030"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - mock_node_modules:/app/mock/node_modules
      - nuxt_cache:/app/.nuxt
      - content_data:/app/.data

volumes:
  node_modules:
  mock_node_modules:
  nuxt_cache:
  content_data:
