shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1

packages:
  - mock

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@tailwindcss/oxide'
  - esbuild
  - sharp
  - vue-demi

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  vue-demi: true
